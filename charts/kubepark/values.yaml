image:
  repository: ghcr.io/frauniki/kubepark
  # Defaults to the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicas: 1

crds:
  # Install/upgrade the CRDs with the chart. CRDs are templated (not in the
  # special crds/ directory) so `helm upgrade` rolls schema changes.
  enabled: true
  # Annotate CRDs with helm.sh/resource-policy: keep so `helm uninstall`
  # leaves them (and all Sandboxes) in place.
  keep: true

serviceAccount:
  create: true
  # Defaults to the fullname.
  name: ""

# The SSH/HTTP gateway. It runs as a second Deployment under the same
# ServiceAccount as the operator (which already carries the required RBAC).
gateway:
  replicas: 1
  # SSH jump host listen port.
  sshPort: 2222
  # HTTP port serving the sign endpoints (and exposedPort routing in M5).
  httpPort: 8080
  # Base domain advertised for HTTP routing (M5). Leave empty to disable.
  baseDomain: ""
  service:
    # Use LoadBalancer to expose the jump host outside the cluster; NodePort
    # or ClusterIP (with your own ingress/L4) also work.
    type: LoadBalancer
    port: 2222
    httpPort: 8080
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# OIDC configuration for `kubepark login`. Leave issuer empty to disable the
# sign endpoint (use `kubepark admin sign-cert` instead).
oidc:
  issuer: ""
  clientID: ""
  principalClaim: email

leaderElection: true

metrics:
  enabled: false
  # Secure serving via controller-runtime with authn/authz.
  bindAddress: ":8443"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

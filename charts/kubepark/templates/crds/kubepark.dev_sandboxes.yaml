{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: sandboxes.kubepark.dev
spec:
  group: kubepark.dev
  names:
    kind: Sandbox
    listKind: SandboxList
    plural: sandboxes
    shortNames:
    - sb
    singular: sandbox
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.desiredState
      name: Desired
      type: string
    - jsonPath: .spec.owner.name
      name: Owner
      type: string
    - jsonPath: .spec.template
      name: Template
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Sandbox is a persistent, declarative workspace. Its pod is a disposable
          executor: the home volume, permissions and gateway route outlive it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Sandbox
            properties:
              accessProfile:
                description: |-
                  AccessProfile optionally names a cluster-scoped AccessProfile whose
                  grants are translated into RBAC for this sandbox's ServiceAccount.
                  Empty means the sandbox gets no Kubernetes API credentials.
                type: string
              desiredState:
                default: Running
                description: |-
                  DesiredState is Running (default) or Stopped (suspended: pod deleted,
                  home and permissions kept).
                enum:
                - Running
                - Stopped
                type: string
              exposedPorts:
                description: ExposedPorts are HTTP ports routed by the gateway.
                items:
                  description: |-
                    ExposedPort declares an HTTP port on the sandbox that the gateway routes
                    to via host-based routing (<port>--<sandbox>--<namespace>.<baseDomain>).
                  properties:
                    allowedGroups:
                      description: |-
                        AllowedGroups optionally grants access to OIDC groups besides the
                        owner. Only meaningful with auth: oidc.
                      items:
                        type: string
                      type: array
                    allowedUsers:
                      description: |-
                        AllowedUsers optionally grants access to OIDC identities besides the
                        owner. Only meaningful with auth: oidc.
                      items:
                        type: string
                      type: array
                    auth:
                      description: Auth selects gateway authentication for this port.
                      enum:
                      - oidc
                      - none
                      type: string
                    name:
                      description: |-
                        Name is the routing key; it becomes the first label segment of the
                        hostname. Must be a DNS label without consecutive hyphens so the
                        hostname parse stays unambiguous.
                      maxLength: 15
                      pattern: ^[a-z]([-a-z0-9]*[a-z0-9])?$
                      type: string
                      x-kubernetes-validations:
                      - message: port name must not contain '--'
                        rule: '!self.contains(''--'')'
                    port:
                      description: Port is the container port to proxy to.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                  required:
                  - auth
                  - name
                  - port
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              home:
                description: Home configures the home volume.
                properties:
                  existingClaim:
                    description: |-
                      ExistingClaim mounts an existing PVC as the home instead of creating
                      one. The claim must not be in use by another non-suspended Sandbox.
                    type: string
                  retainPolicy:
                    default: Retain
                    description: |-
                      RetainPolicy controls the PVC's fate on Sandbox deletion.
                      Defaults to Retain.
                    enum:
                    - Retain
                    - Delete
                    type: string
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: Size overrides the template's homeSize for the created
                      PVC.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: StorageClassName overrides the template's storage
                      class.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: 'retainPolicy Delete cannot be combined with existingClaim:
                    kubepark never deletes PVCs it did not create'
                  rule: '!(has(self.existingClaim) && size(self.existingClaim) > 0
                    && has(self.retainPolicy) && self.retainPolicy == ''Delete'')'
              idleTimeout:
                description: |-
                  IdleTimeout suspends the sandbox after this duration without active
                  sessions. Unset inherits the template default; 0 disables idle
                  suspension.
                type: string
              owner:
                description: Owner is the identity allowed to connect to this sandbox.
                properties:
                  groups:
                    description: Groups optionally records the owner's OIDC groups.
                    items:
                      type: string
                    type: array
                  name:
                    description: Name is the OIDC identity (certificate principal)
                      of the owner.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              template:
                description: |-
                  Template names the cluster-scoped SandboxTemplate this sandbox is
                  built from.
                minLength: 1
                type: string
            required:
            - owner
            - template
            type: object
          status:
            description: status defines the observed state of Sandbox
            properties:
              activeSessions:
                description: |-
                  ActiveSessions is display-only; the suspend decision is always
                  computed from the live SandboxSession list.
                format: int32
                type: integer
              conditions:
                description: conditions represent the current state of the Sandbox
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastActivityTime:
                description: |-
                  LastActivityTime is initialized when the sandbox becomes Running and
                  updated when sessions close. It drives idle suspension.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: Phase is a derived one-word summary; conditions are authoritative.
                enum:
                - Pending
                - Provisioning
                - Running
                - Suspending
                - Suspended
                - Resuming
                - Failed
                - Terminating
                type: string
              podIP:
                description: |-
                  PodIP is the routing target for the gateway. Cleared while the
                  sandbox is suspending or suspended.
                type: string
              podName:
                description: PodName is the current executor pod, if any.
                type: string
              pvcName:
                description: PVCName is the home volume claim in use.
                type: string
              serviceAccountName:
                description: |-
                  ServiceAccountName is the per-sandbox SA carrying AccessProfile
                  grants.
                type: string
              templateHash:
                description: |-
                  TemplateHash pins the hash of the template spec the current pod was
                  built from. Template changes never restart a running pod; they apply
                  on the next resume.
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: sandbox name must not contain '--' (reserved as the gateway hostname
            separator)
          rule: '!self.metadata.name.contains(''--'')'
        - message: sandbox name must be at most 30 characters so gateway hostnames
            fit in a DNS label
          rule: self.metadata.name.size() <= 30
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}

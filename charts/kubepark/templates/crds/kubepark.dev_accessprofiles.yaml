{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: accessprofiles.kubepark.dev
spec:
  group: kubepark.dev
  names:
    kind: AccessProfile
    listKind: AccessProfileList
    plural: accessprofiles
    shortNames:
    - ap
    singular: accessprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Valid")].status
      name: Valid
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AccessProfile declares which Kubernetes operations a sandbox may perform.
          The controller translates it into a per-namespace Role plus a per-sandbox
          RoleBinding for the sandbox's ServiceAccount.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of AccessProfile
            properties:
              allowedNamespaces:
                description: |-
                  AllowedNamespaces is the explicit list of namespaces whose Sandboxes
                  may reference this profile. A Sandbox in any other namespace is
                  refused (RBACReady=False, reason ProfileNotPermitted). Empty means no
                  namespace may use the profile — referencing, not creation, is the
                  escalation surface, so the default is deny.
                items:
                  type: string
                type: array
              grants:
                description: |-
                  Grants are the permissions this profile bestows on a sandbox's
                  ServiceAccount.
                items:
                  description: |-
                    NamespacedGrant grants RBAC rules in an explicit list of namespaces.
                    v1 deliberately supports namespaced grants only (no cluster-wide rules).
                  properties:
                    namespaces:
                      description: |-
                        Namespaces is the explicit list of namespaces the rules apply in.
                        Wildcards are not supported.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    rules:
                      description: |-
                        Rules are standard RBAC policy rules, applied verbatim as a Role in
                        each listed namespace.
                      items:
                        description: |-
                          PolicyRule holds information that describes a policy rule, but does not contain information
                          about who the rule applies to or which namespace the rule applies to.
                        properties:
                          apiGroups:
                            description: |-
                              APIGroups is the name of the APIGroup that contains the resources.  If multiple API groups are specified, any action requested against one of
                              the enumerated resources in any API group will be allowed. "" represents the core API group and "*" represents all API groups.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: atomic
                          nonResourceURLs:
                            description: |-
                              NonResourceURLs is a set of partial urls that a user should have access to.  *s are allowed, but only as the full, final step in the path
                              Since non-resource URLs are not namespaced, this field is only applicable for ClusterRoles referenced from a ClusterRoleBinding.
                              Rules can either apply to API resources (such as "pods" or "secrets") or non-resource URL paths (such as "/api"),  but not both.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: atomic
                          resourceNames:
                            description: ResourceNames is an optional white list of
                              names that the rule applies to.  An empty set means
                              that everything is allowed.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: atomic
                          resources:
                            description: Resources is a list of resources this rule
                              applies to. '*' represents all resources.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: atomic
                          verbs:
                            description: Verbs is a list of Verbs that apply to ALL
                              the ResourceKinds contained in this rule. '*' represents
                              all verbs.
                            items:
                              type: string
                            type: array
                            x-kubernetes-list-type: atomic
                        required:
                        - verbs
                        type: object
                      minItems: 1
                      type: array
                  required:
                  - namespaces
                  - rules
                  type: object
                minItems: 1
                type: array
            required:
            - grants
            type: object
          status:
            description: status defines the observed state of AccessProfile
            properties:
              conditions:
                description: conditions represent the current state of the AccessProfile
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}

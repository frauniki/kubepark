apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubepark.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepark.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "kubepark.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "kubepark.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
        # Sandbox NetworkPolicies allow ingress only from pods carrying this
        # label, so the gateway can reach sandbox agents.
        kubepark.dev/component: gateway
    spec:
      serviceAccountName: {{ include "kubepark.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: {{ include "kubepark.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - gateway
            - --ssh-address=:{{ .Values.gateway.sshPort }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: {{ .Values.gateway.sshPort }}
              name: ssh
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubepark.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubepark.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    {{- include "kubepark.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - name: ssh
      port: {{ .Values.gateway.service.port }}
      targetPort: ssh
      protocol: TCP

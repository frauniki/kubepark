---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - kubepark.dev
  resources:
  - accessprofiles
  - sandboxes
  - sandboxsessions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubepark.dev
  resources:
  - accessprofiles/finalizers
  - sandboxes/finalizers
  - sandboxsessions/finalizers
  verbs:
  - update
- apiGroups:
  - kubepark.dev
  resources:
  - accessprofiles/status
  - sandboxes/status
  - sandboxsessions/status
  verbs:
  - get
  - patch
  - update

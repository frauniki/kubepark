---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: sandboxsessions.kubepark.dev
spec:
  group: kubepark.dev
  names:
    kind: SandboxSession
    listKind: SandboxSessionList
    plural: sandboxsessions
    shortNames:
    - sbs
    singular: sandboxsession
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sandboxName
      name: Sandbox
      type: string
    - jsonPath: .spec.user
      name: User
      type: string
    - jsonPath: .spec.kind
      name: Kind
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SandboxSession is the short-lived audit record of one connection to a
          sandbox through the gateway.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of SandboxSession
            properties:
              certSerial:
                description: |-
                  CertSerial is the serial of the SSH certificate used, for joining
                  with signing audit logs.
                type: string
              clientAddr:
                description: ClientAddr is the remote address the connection came
                  from.
                type: string
              heartbeatInterval:
                description: |-
                  HeartbeatInterval is stamped by the gateway at creation so the stale
                  reaper can compute its threshold without re-deriving the sandbox's
                  idle timeout.
                type: string
              kind:
                description: Kind is ssh or http.
                enum:
                - ssh
                - http
                type: string
              sandboxName:
                description: SandboxName is the sandbox this session connects to (same
                  namespace).
                minLength: 1
                type: string
              user:
                description: |-
                  User is the authenticated identity (SSH certificate principal or OIDC
                  claim).
                minLength: 1
                type: string
            required:
            - kind
            - sandboxName
            - user
            type: object
          status:
            description: status defines the observed state of SandboxSession
            properties:
              endTime:
                format: date-time
                type: string
              exitReason:
                description: |-
                  ExitReason records why the session closed (Disconnected,
                  StaleHeartbeat, SandboxDeleted).
                type: string
              lastActivityTime:
                description: LastActivityTime is refreshed by gateway heartbeats.
                format: date-time
                type: string
              startTime:
                format: date-time
                type: string
              state:
                description: State is Active while the connection lives, then Closed.
                enum:
                - Active
                - Closed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

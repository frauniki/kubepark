# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
language: "ja"

reviews:
  profile: chill
  high_level_summary: true
  poem: false
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    # release-please のリリースPRはレビュー不要
    ignore_title_keywords:
      - "chore(main): release"

  path_filters:
    # 生成物はレビュー対象外
    - "!api/**/zz_generated.deepcopy.go"
    - "!config/crd/bases/**"
    - "!charts/kubepark/templates/crds/**"
    - "!go.sum"
    - "!bin/**"
    - "!docs/src/content/docs/reference/api.md"
    - "!docs/pnpm-lock.yaml"

  path_instructions:
    - path: "api/v1alpha1/**"
      instructions: |
        CRD の型定義。フィールドの追加/変更時は kubebuilder マーカー
        (validation, printcolumn) と CEL ルールの整合を確認する。
        セキュリティ由来の CEL 制約(Sandbox 名の `--` 禁止と最大長、
        existingClaim + retainPolicy: Delete の併用禁止、
        isolationLevel: strong 時の runtimeClassName 必須)を
        緩める変更は必ず指摘する。型を変更したのに `make manifests` /
        `make helm-sync-crds` / `make api-docs` の生成物が同じ PR で
        更新されていなければ指摘する。
    - path: "internal/controller/**"
      instructions: |
        reconciler は冪等であること。状態機械の不変条件を壊さないこと:
        Suspended で PVC/SA/RBAC/host key は保持し Pod のみ削除、
        Running Pod は template 変更で再起動しない(次の resume で適用)、
        suspend 判定は status.activeSessions ではなく field index の
        live な Active session 一覧から計算する。finalizer の GC 対象
        (Pod, SA, 全 grant namespace の Role/RoleBinding, NetworkPolicy,
        host key Secret)と保持対象(retainPolicy に従う PVC)を混同しない。
        一時的エラーは return err、恒久的エラーは condition を立てて
        requeue しない。
    - path: "internal/gateway/** , internal/agent/** , internal/sshca/**"
      instructions: |
        セキュリティの要石。SSH 証明書の principal 検証は
        sshca.CheckUserCert に集約し、gateway と agent の双方で
        principal == sandbox.spec.owner.name の exact match を行う。
        principal なし証明書の拒否、cert type (user/host) と有効期間の
        検証を欠く変更は必ず指摘する。sandbox Pod に user CA の
        「秘密鍵」がマウントされる変更は重大な問題として指摘する
        (Pod に渡してよいのは公開鍵のみ)。未認証 HTTP トラフィックから
        SandboxSession CR を作成する・suspended sandbox を wake する
        変更も指摘する。
    - path: "charts/kubepark/**"
      instructions: |
        新機能のトグルは default off で、デフォルト値での
        `helm template` 出力が変わらないこと。values.yaml に追加した
        キーはコメントで用途を説明する。templates/crds/ は生成物なので
        手編集を見つけたら指摘する。AccessProfile の作成権限を
        管理者以外に広げる RBAC 変更は信頼境界の破壊として指摘する。
    - path: ".github/workflows/**"
      instructions: |
        コミットメッセージは Conventional Commits(release-please が
        バージョニングに使用)。action は commit SHA + バージョンコメント
        (`uses: owner/repo@<sha> # vX.Y.Z`)で固定している方針。
        タグ参照を見つけたら指摘する。
    - path: "docs/**"
      instructions: |
        Astro Starlight のドキュメントサイト(en/ja の i18n)。英語ページ
        (docs/src/content/docs/ 直下)を変更した PR では、対応する
        docs/src/content/docs/ja/ の同名ページも更新されているか確認する
        (未翻訳化する場合は ja 側を削除してフォールバックに戻すのが正)。
        内部リンクは base prefix(/kubepark/)付きの絶対パスで書く。
        reference/api.md は生成物(make api-docs)なので手編集を指摘する。

  tools:
    golangci-lint:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    hadolint:
      enabled: true
    gitleaks:
      enabled: true

  pre_merge_checks:
    title:
      mode: warning
      requirements: |
        Conventional Commits 形式(feat:, fix:, docs:, chore: など)。
        release-please がこの形式からリリースノートとバージョンを生成する。

chat:
  auto_reply: true
